<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Học từ vựng theo hình ảnh</title>
  <style>
    :root {
      --pink: #b0006d;
      --pink-soft: #fff0f8;
      --blue: #0b72d9;
      --text: #222;
      --border: #e8d6e2;
      --bg: #f7edf4;
      --muted: #6c5261;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    .app.exercise-mode {
      width: min(1280px, 100%);
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 520px) minmax(180px, 1fr) auto;
      align-items: start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .nav-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .title-wrap {
      min-width: 0;
      padding-top: 2px;
    }

    h1 {
      margin: 0;
      color: var(--pink);
      font-size: clamp(22px, 3vw, 34px);
    }

    .vi-title {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      min-height: 42px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      line-height: 1.35;
      box-shadow: 0 4px 14px rgba(80, 0, 50, 0.08);
    }

    .status .status-main {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      text-align: center;
    }

    .word-top {
      width: 100%;
      min-width: 0;
      display: flex;
      align-items: baseline;
      justify-content: center;
      flex-wrap: wrap;
      column-gap: 8px;
      row-gap: 2px;
    }

    .status strong {
      color: var(--blue);
      font-size: 20px;
    }

    .ipa {
      color: #374151;
      font-size: 14px;
      font-style: normal;
      font-weight: 700;
      white-space: nowrap;
    }

    .word-vi {
      width: 100%;
      color: #1f2937;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.25;
      text-align: center;
    }

    .status .study-progress {
      margin-left: auto;
      color: var(--blue);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      line-height: 1.35;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      letter-spacing: 0;
      text-transform: none;
      flex: 0 0 auto;
    }

    .status .study-progress .progress-label {
      color: var(--blue);
      font-size: 13px;
      font-weight: 600;
    }

    .status .study-progress .progress-count {
      color: var(--blue);
      font-size: 15px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .nav-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 8px 12px;
      border: 1px solid var(--pink);
      border-radius: 8px;
      background: white;
      color: var(--pink);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .link-btn.primary {
      background: var(--pink);
      color: #fff;
    }

    .stage {
      position: relative;
      width: 100%;
      border-radius: 8px;
      overflow: visible;
      background: white;
      border: 1px solid var(--border);
      box-shadow: 0 10px 26px rgba(80, 0, 50, 0.12);
    }

    .stage img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
    }

    .app.exercise-mode .topbar {
      grid-column: 1 / -1;
      margin-bottom: 0;
    }

    .app.exercise-mode .stage {
      grid-column: 1;
      grid-row: 2 / 4;
      align-self: start;
      justify-self: center;
      width: min(100%, calc((100vh - 150px) * var(--image-ratio, 1.35)));
      max-height: calc(100vh - 150px);
    }

    .app.exercise-mode .stage img {
      width: 100%;
      height: auto;
    }

    .hotspot {
      position: absolute;
      border: 2px solid transparent;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      transform-origin: center;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }

    .hotspot.shape-polygon {
      clip-path: var(--clip-path);
      border-radius: 0;
    }

    .hotspot.shape-polygon:hover,
    .hotspot.shape-polygon.active,
    .hotspot.shape-polygon.study-hover {
      background: rgba(176, 0, 109, 0.12);
      border-color: transparent;
      box-shadow: none;
    }

    .hotspot:hover,
    .hotspot.active {
      background: transparent;
      border-color: rgba(176, 0, 109, 0.85);
      box-shadow: 0 0 0 3px rgba(176, 0, 109, 0.15);
    }

    .hotspot.study-hover {
      border-color: rgba(176, 0, 109, 0.9);
      box-shadow: 0 0 0 3px rgba(176, 0, 109, 0.15);
    }

    .hotspot span {
      position: absolute;
      left: 50%;
      top: -30px;
      transform: translateX(-50%);
      white-space: nowrap;
      background: var(--pink);
      color: white;
      font-weight: 700;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }

    .hotspot:hover span,
    .hotspot.active span {
      opacity: 1;
    }

    .hotspot.done {
      border-color: transparent;
      box-shadow: none;
    }

    .study-tooltip {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 5;
      width: max-content;
      max-width: min(600px, calc(100vw - 32px));
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, .98);
      box-shadow: 0 8px 24px rgba(80, 0, 50, .16);
      pointer-events: none;
      transform: translate(calc(-50% + var(--tooltip-shift, 0px)), -112%);
      white-space: normal;
      overflow-wrap: break-word;
      line-height: 1.35;
      text-align: center;
    }

    .study-tooltip.below {
      transform: translate(calc(-50% + var(--tooltip-shift, 0px)), 12%);
    }

    .study-tooltip[hidden] {
      display: none;
    }

    .study-tooltip .tooltip-head {
      display: flex;
      align-items: baseline;
      justify-content: center;
      flex-wrap: wrap;
      column-gap: 8px;
      row-gap: 2px;
      text-align: center;
    }

    .study-tooltip strong {
      color: var(--blue);
      font-size: 18px;
    }

    .study-tooltip .tooltip-vi {
      margin-top: 3px;
      color: #1f2937;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.25;
      text-align: center;
    }

    .study-tooltip .ipa {
      color: #374151;
    }

    .mode-menu {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
      white-space: nowrap;
      padding-top: 2px;
    }

    .mode-menu span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .mode-select {
      border: 1px solid var(--border);
      background: white;
      color: #333;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .mode-select:focus {
      border-color: var(--pink);
      outline: none;
      box-shadow: 0 0 0 3px rgba(176, 0, 109, .1);
    }

    .exercise-panel {
      position: relative;
      z-index: 10;
      border: 1px solid var(--border);
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(80, 0, 50, .08);
    }

    .app.exercise-mode .exercise-panel {
      grid-column: 2;
      grid-row: 2 / 4;
      min-height: 0;
      max-height: 100%;
      overflow-y: auto;
      margin-bottom: 0;
    }

    .exercise-title {
      margin: 0 0 8px;
      color: var(--pink);
      font-weight: 700;
    }

    .progress {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 10px;
    }

    .choice-grid,
    .word-chip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }

    .app.exercise-mode .choice-grid,
    .app.exercise-mode .word-chip-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .choice-btn,
    .word-chip {
      position: relative;
      z-index: 11;
      pointer-events: auto;
      border: 1px solid var(--border);
      background: #fff;
      color: #222;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      text-align: left;
      font-size: 15px;
    }

    .app.exercise-mode .choice-btn,
    .app.exercise-mode .word-chip {
      padding: 8px 10px;
      font-size: 14px;
      line-height: 1.25;
    }

    .choice-btn:hover,
    .word-chip:hover,
    .word-chip.active {
      border-color: var(--pink);
      background: var(--pink-soft);
      color: var(--pink);
    }

    .choice-btn.correct,
    .word-chip.done {
      border-color: #15803d;
      background: #ecfdf3;
      color: #166534;
      font-weight: 700;
    }

    .choice-btn.wrong {
      border-color: #dc2626;
      background: #fff1f2;
      color: #b91c1c;
    }

    .exercise-feedback {
      min-height: 44px;
      margin-top: 30px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      display: flex;
      align-items: center;
      font-size: 15px;
      line-height: 1.35;
    }

    .exercise-feedback.info {
      border-color: var(--border);
      color: var(--muted);
    }

    .exercise-feedback.ok {
      border-color: #15803d;
      background: #ecfdf3;
      color: #166534;
      font-weight: 700;
    }

    .exercise-feedback.bad {
      border-color: #dc2626;
      background: #fff1f2;
      color: #b91c1c;
      font-weight: 700;
    }

    .word-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .app.exercise-mode .word-list {
      grid-column: 2;
      grid-row: 3;
      min-height: 0;
      max-height: 100%;
      overflow-y: auto;
      align-content: start;
      grid-template-columns: 1fr;
      margin-top: 0;
    }

    .empty {
      padding: 18px;
      background: white;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .app { padding: 10px; }
      .app.exercise-mode {
        height: auto;
        display: block;
        overflow: visible;
      }
      .topbar {
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .nav-stack {
        width: 100%;
      }
      .app.exercise-mode .stage {
        width: 100%;
        max-height: none;
      }
      .app.exercise-mode .exercise-panel {
        max-height: none;
        overflow: visible;
      }
      .app.exercise-mode .word-list {
        max-height: none;
        overflow: visible;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        margin-top: 14px;
      }
      .app.exercise-mode .choice-grid,
      .app.exercise-mode .word-chip-grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }
      .nav-actions { justify-content: stretch; }
      .link-btn { flex: 1; }
      .mode-menu {
        justify-content: stretch;
      }
      .mode-select {
        flex: 1;
      }
      .status { font-size: 14px; }
      .hotspot { border-width: 1px; border-radius: 5px; }
      .hotspot span { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="nav-stack">
        <div class="nav-actions">
          <a class="link-btn" href="index.html">Trang chủ</a>
          <a class="link-btn primary" id="editorLink" href="hotspot_editor.html">Chỉnh tọa độ</a>
        </div>
        <div class="status" id="status">Bấm vào đồ vật trong ảnh để nghe phát âm.</div>
      </div>
      <div class="title-wrap">
        <h1 id="title">Học từ vựng</h1>
        <p class="vi-title" id="viTitle"></p>
      </div>
      <label class="mode-menu" for="modeSelect">
        <span>Chế độ</span>
        <select class="mode-select" id="modeSelect">
          <option value="study">Học</option>
          <option value="exercise1">Bài tập 1: Ảnh → Nghĩa</option>
          <option value="exercise2">Bài tập 2: Nghĩa → Ảnh</option>
        </select>
      </label>
    </div>

    <section class="stage" id="stage" aria-label="Vocabulary picture">
      <img id="mainImage" src="" alt="">
      <div class="study-tooltip" id="studyTooltip" hidden></div>
    </section>

    <div class="exercise-panel" id="exercisePanel" hidden></div>
    <div class="word-list" id="wordList"></div>
  </main>

  <audio id="ttsAudio" preload="none"></audio>

  <script src="data.js"></script>
  <script>
    async function initLesson() {
      await VOCAB_UTILS.loadData();
    const topicId = VOCAB_UTILS.getParam("topic") || VOCAB_TOPICS[0]?.topic_id;
    const topic = VOCAB_UTILS.getTopic(topicId);
    const hotspots = VOCAB_UTILS.getHotspots(topic.topic_id);
    const stage = document.getElementById("stage");
    const app = document.querySelector(".app");
    const image = document.getElementById("mainImage");
    const studyTooltip = document.getElementById("studyTooltip");
    const wordList = document.getElementById("wordList");
    const status = document.getElementById("status");
    const audio = document.getElementById("ttsAudio");
    const exercisePanel = document.getElementById("exercisePanel");
    const modeSelect = document.getElementById("modeSelect");
    let activeKey = "";
    let mode = "study";
    let studyDone = new Set();
    let exercise1Selected = null;
    let exercise1Done = new Set();
    let exercise1NeedsNewImage = false;
    let exercise2Selected = null;
    let exercise2Done = new Set();
    let exerciseFeedback = "";
    let exerciseFeedbackType = "info";

    document.title = topic.title || "Học từ vựng";
    document.getElementById("title").textContent = topic.title || "Học từ vựng";
    document.getElementById("viTitle").textContent = topic.vi_title || "";
    document.getElementById("editorLink").href = `hotspot_editor.html?topic=${encodeURIComponent(topic.topic_id)}`;
    image.src = topic.image;
    image.alt = topic.title || "Vocabulary picture";
    image.addEventListener("load", () => {
      const ratio = image.naturalWidth && image.naturalHeight ? image.naturalWidth / image.naturalHeight : 1.35;
      stage.style.setProperty("--image-ratio", ratio);
    });

    function googleTtsUrl(text, lang = "en") {
      return `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`;
    }

    function speakWithBrowser(text) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.85;
      window.speechSynthesis.speak(utterance);
    }

    function round(value) {
      return Math.round(value * 10) / 10;
    }

    function parsePoints(pointsText) {
      return String(pointsText || "")
        .trim()
        .split(/\s+/)
        .map(pair => pair.split(",").map(Number))
        .filter(pair => pair.length === 2 && pair.every(Number.isFinite))
        .map(([x, y]) => ({ x, y }));
    }

    function getShapeBox(item) {
      const points = parsePoints(item.points);
      if (String(item.shape || "rect") === "polygon" && points.length >= 3) {
        const xs = points.map(point => point.x);
        const ys = points.map(point => point.y);
        const left = Math.min(...xs);
        const top = Math.min(...ys);
        const right = Math.max(...xs);
        const bottom = Math.max(...ys);
        return { x: left, y: top, w: right - left, h: bottom - top, points };
      }
      return {
        x: Number(item.x) || 0,
        y: Number(item.y) || 0,
        w: Number(item.w) || 1,
        h: Number(item.h) || 1,
        points: []
      };
    }

    function applyHotspotShape(element, item) {
      const shape = String(item.shape || "rect");
      const box = getShapeBox(item);
      element.classList.toggle("shape-polygon", shape === "polygon" && box.points.length >= 3);
      element.classList.toggle("shape-rotated", shape === "rotated");
      element.style.left = `${box.x}%`;
      element.style.top = `${box.y}%`;
      element.style.width = `${box.w}%`;
      element.style.height = `${box.h}%`;
      element.style.transform = shape === "rotated" ? `rotate(${Number(item.angle) || 0}deg)` : "";
      element.style.removeProperty("--clip-path");
      if (shape === "polygon" && box.points.length >= 3 && box.w > 0 && box.h > 0) {
        const localPoints = box.points
          .map(point => `${round(((point.x - box.x) / box.w) * 100)}% ${round(((point.y - box.y) / box.h) * 100)}%`)
          .join(", ");
        element.style.setProperty("--clip-path", `polygon(${localPoints})`);
      }
      return box;
    }

    function playWord(item, options = {}) {
      const { highlight = true, updateStatus = true } = options;
      activeKey = item.word;
      if (updateStatus) {
        status.innerHTML = `<span class="status-main">${wordInfoHtml(item)}</span>${mode === "study" ? statusProgressHtml() : ""}`;
      }

      const text = item.pronunciation_text || item.word;
      audio.pause();
      audio.currentTime = 0;
      audio.referrerPolicy = "no-referrer";
      audio.src = googleTtsUrl(text, "en");
      audio.play().catch(() => speakWithBrowser(text));
    }

    function showStudyTooltip(item) {
      if (mode !== "study") return;
      const box = getShapeBox(item);
      const centerX = box.x + box.w / 2;
      const topY = box.y;
      const below = topY < 7;
      const tooltipY = below ? box.y + box.h : topY;
      studyTooltip.hidden = false;
      studyTooltip.classList.toggle("below", below);
      studyTooltip.style.setProperty("--tooltip-shift", "0px");
      studyTooltip.style.left = `${centerX}%`;
      studyTooltip.style.top = `${tooltipY}%`;
      studyTooltip.innerHTML = `<div class="tooltip-head"><strong>${escapeHtml(item.display_text || item.word)}</strong>${ipaHtml(item)}</div><div class="tooltip-vi">${escapeHtml(item.vi || "")}</div>`;
      requestAnimationFrame(clampStudyTooltip);
    }

    function clampStudyTooltip() {
      if (studyTooltip.hidden) return;
      const padding = 8;
      const rect = studyTooltip.getBoundingClientRect();
      let shift = 0;
      if (rect.left < padding) shift = padding - rect.left;
      if (rect.right > window.innerWidth - padding) shift = (window.innerWidth - padding) - rect.right;
      studyTooltip.style.setProperty("--tooltip-shift", `${round(shift)}px`);
    }

    function hideStudyTooltip() {
      if (mode !== "study") return;
      activeKey = "";
      studyTooltip.hidden = true;
      stage.querySelectorAll(".hotspot.study-hover").forEach(el => el.classList.remove("study-hover"));
    }

    function playAudioOnly(item) {
      const text = item.pronunciation_text || item.word;
      audio.pause();
      audio.currentTime = 0;
      audio.referrerPolicy = "no-referrer";
      audio.src = googleTtsUrl(text, "en");
      audio.play().catch(() => speakWithBrowser(text));
    }

    function shuffle(list) {
      return [...list].sort(() => Math.random() - 0.5);
    }

    function makeChoices(correctItem, field) {
      const others = hotspots
        .filter(item => item.word !== correctItem.word && item[field])
        .map(item => item[field]);
      return shuffle([correctItem[field], ...shuffle(others).slice(0, 3)]);
    }

    function setStatus(text) {
      status.textContent = text;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function ipaText(item) {
      return String(item?.ipa || "").trim();
    }

    function ipaHtml(item) {
      const ipa = ipaText(item);
      return ipa ? `<em class="ipa">${escapeHtml(ipa)}</em>` : "";
    }

    function wordInfoHtml(item) {
      return `<span class="word-top"><strong>${escapeHtml(item.display_text || item.word)}</strong>${ipaHtml(item)}</span><span class="word-vi">${escapeHtml(item.vi || "")}</span>`;
    }

    function statusProgressHtml() {
      return `<span class="study-progress"><span class="progress-label">Đã học</span><span class="progress-count">${studyDone.size}/${hotspots.length}</span></span>`;
    }

    function setStudyMessageStatus(message) {
      status.innerHTML = `<span class="status-main">${escapeHtml(message)}</span>${statusProgressHtml()}`;
    }

    function feedbackHtml() {
      return `<div class="exercise-feedback ${exerciseFeedbackType}">${exerciseFeedback ? escapeHtml(exerciseFeedback) : "&nbsp;"}</div>`;
    }

    function setExerciseFeedback(text, type = "info") {
      exerciseFeedback = text;
      exerciseFeedbackType = type;
      const el = exercisePanel.querySelector(".exercise-feedback");
      if (!el) return;
      el.className = `exercise-feedback ${exerciseFeedbackType}`;
      el.textContent = exerciseFeedback || "\u00a0";
    }

    function isComplete(doneSet) {
      return hotspots.length > 0 && doneSet.size >= hotspots.length;
    }

    function isStudyComplete() {
      return hotspots.length > 0 && studyDone.size >= hotspots.length;
    }

    function studyProgressText() {
      return `Đã học ${studyDone.size}/${hotspots.length}`;
    }

    function setStudyStartStatus() {
      const rest = Math.max(0, hotspots.length - studyDone.size);
      if (isStudyComplete()) {
        setStudyMessageStatus("Đã học đủ từ vựng. Có thể chuyển sang bài tập.");
      } else {
        setStudyMessageStatus(`Bấm vào từng đồ vật để học hết từ vựng trước khi làm bài tập. Còn ${rest} từ.`);
      }
    }

    function setStudyItemStatus(item) {
      status.innerHTML = `<span class="status-main">${wordInfoHtml(item)}</span>${statusProgressHtml()}`;
    }

    function markStudied(item) {
      studyDone.add(item.word);
    }

    function setMode(nextMode) {
      const blockedByStudy = nextMode !== "study" && !isStudyComplete();
      mode = blockedByStudy ? "study" : nextMode;
      activeKey = "";
      exercise1Selected = null;
      exercise1Done = new Set();
      exercise1NeedsNewImage = false;
      exercise2Selected = null;
      exercise2Done = new Set();
      exerciseFeedback = "";
      exerciseFeedbackType = "info";
      app.classList.toggle("exercise-mode", mode !== "study");
      wordList.hidden = true;
      modeSelect.value = mode;

      if (mode === "study") {
        setStudyStartStatus();
      } else if (mode === "exercise1") {
        setStatus("Bài tập 1: bấm vào một đồ vật trên ảnh, rồi chọn đúng nghĩa tiếng Việt.");
      } else {
        exercise2Selected = null;
        activeKey = "";
        setStatus("Bài tập 2: chọn nghĩa tiếng Việt bên dưới, rồi bấm đúng đồ vật trên ảnh.");
      }
      render(hotspots);
      renderExercisePanel();
    }

    function handleHotspot(item, event) {
      if (mode === "study") {
        event?.currentTarget?.classList.add("study-hover");
        showStudyTooltip(item);
        markStudied(item);
        playWord(item, { highlight: false, updateStatus: false });
        setStudyItemStatus(item);
        return;
      }

      if (mode === "exercise1") {
        if (exercise1Done.has(item.word)) {
          setExerciseFeedback("Từ này đã làm đúng rồi. Chọn đồ vật khác nhé.", "info");
          return;
        }
        if (exercise1NeedsNewImage && exercise1Selected?.word === item.word) {
          setExerciseFeedback("Chọn hình ảnh khác.", "bad");
          return;
        }
        exercise1Selected = item;
        exercise1NeedsNewImage = false;
        activeKey = "";
        exerciseFeedback = "Chọn nghĩa tiếng Việt đúng cho đồ vật vừa bấm.";
        exerciseFeedbackType = "info";
        render(hotspots);
        renderExercisePanel();
        return;
      }

      if (!exercise2Selected) {
        setExerciseFeedback("Hãy chọn một nghĩa tiếng Việt ở bảng bên phải trước.", "info");
        return;
      }

      if (item.word === exercise2Selected.word) {
        exercise2Done.add(item.word);
        exerciseFeedback = isComplete(exercise2Done)
          ? "Xong, học tiếp phần sau!"
          : `Đúng: ${exercise2Selected.vi || exercise2Selected.display_text || exercise2Selected.word}`;
        exerciseFeedbackType = "ok";
        activeKey = item.word;
        exercise2Selected = null;
        playAudioOnly(item);
        render(hotspots);
        renderExercisePanel();
      } else {
        setExerciseFeedback("Chưa đúng, hãy bấm lại đúng vị trí trên ảnh.", "bad");
      }
    }

    function answerExercise1(choice, button) {
      if (!exercise1Selected) return;
      if (choice === exercise1Selected.vi) {
        button.classList.add("correct");
        exercise1Done.add(exercise1Selected.word);
        playAudioOnly(exercise1Selected);
        setExerciseFeedback(`Đúng: ${exercise1Selected.vi || exercise1Selected.display_text || exercise1Selected.word}`, "ok");
        activeKey = "";
        exercise1Selected = null;
        exercise1NeedsNewImage = false;
        setTimeout(() => {
          if (isComplete(exercise1Done)) {
            exerciseFeedback = "Xong, học tiếp phần sau!";
            exerciseFeedbackType = "ok";
          }
          render(hotspots);
          renderExercisePanel();
        }, 450);
      } else {
        button.classList.add("wrong");
        exercise1NeedsNewImage = true;
        exercisePanel.querySelectorAll(".choice-btn").forEach(btn => {
          btn.disabled = true;
        });
        setExerciseFeedback("Chọn hình ảnh khác.", "bad");
      }
    }

    function selectExercise2Word(item) {
      if (!item || exercise2Done.has(item.word)) return;
      exercise2Selected = item;
      activeKey = "";
      exerciseFeedback = `Hãy bấm đúng hình ảnh của nghĩa: ${item.vi || item.display_text || item.word}`;
      exerciseFeedbackType = "info";
      render(hotspots);
      renderExercisePanel();
    }

    function renderExercisePanel() {
      if (mode === "study") {
        exercisePanel.hidden = true;
        exercisePanel.innerHTML = "";
        return;
      }

      exercisePanel.hidden = false;

      if (mode === "exercise1") {
        const progress = `${exercise1Done.size}/${hotspots.length}`;
        if (isComplete(exercise1Done)) {
          exercisePanel.innerHTML = `
            <p class="exercise-title">Bài tập 1 hoàn thành</p>
            <p class="progress">Đúng ${progress} từ. Xong, học tiếp phần sau!</p>
            ${feedbackHtml()}
          `;
          return;
        }
        if (!exercise1Selected) {
          exercisePanel.innerHTML = `
            <p class="exercise-title">Bài tập 1: Ảnh → Nghĩa tiếng Việt</p>
            <p class="progress">Tiến độ: ${progress}. Hãy bấm vào một đồ vật trên ảnh.</p>
            ${feedbackHtml()}
          `;
          return;
        }
        const choices = makeChoices(exercise1Selected, "vi");
        exercisePanel.innerHTML = `
          <p class="exercise-title">Chọn nghĩa đúng</p>
          <p class="progress">Tiến độ: ${progress}. Hãy chọn nghĩa tiếng Việt đúng.</p>
          <div class="choice-grid">
            ${choices.map(choice => `<button class="choice-btn" type="button" ${exercise1NeedsNewImage ? "disabled" : ""}>${choice}</button>`).join("")}
          </div>
          ${feedbackHtml()}
        `;
        return;
      }

      const progress = `${exercise2Done.size}/${hotspots.length}`;
      if (isComplete(exercise2Done)) {
        exercisePanel.innerHTML = `
          <p class="exercise-title">Bài tập 2 hoàn thành</p>
          <p class="progress">Đúng ${progress} từ. Xong, học tiếp phần sau!</p>
          ${feedbackHtml()}
        `;
        return;
      }
      exercisePanel.innerHTML = `
        <p class="exercise-title">Bài tập 2: Nghĩa tiếng Việt → Hình ảnh</p>
        <p class="progress">Tiến độ: ${progress}. Chọn nghĩa tiếng Việt, rồi bấm đúng đồ vật trên ảnh.</p>
        <div class="word-chip-grid">
          ${hotspots.map(item => `
            <button class="word-chip ${exercise2Done.has(item.word) ? "done" : ""} ${exercise2Selected?.word === item.word ? "active" : ""}"
              type="button" data-id="${item.id}" ${exercise2Done.has(item.word) ? "disabled" : ""}>
              ${item.vi || item.display_text || item.word}
            </button>
          `).join("")}
        </div>
        ${feedbackHtml()}
      `;
    }

    function render(data) {
      stage.querySelectorAll(".hotspot").forEach(el => el.remove());
      wordList.innerHTML = "";

      if (!data.length) {
        wordList.innerHTML = `<div class="empty">Chủ đề này chưa có từ vựng. Hãy mở Chỉnh tọa độ để tạo vùng và copy data vào Sheet.</div>`;
        return;
      }

      data.forEach(item => {
        const hotspot = document.createElement("button");
        hotspot.type = "button";
        hotspot.className = "hotspot";
        if (mode === "study" && item.word === activeKey) hotspot.classList.add("active");
        if (mode === "exercise1" && exercise1Selected?.word === item.word) hotspot.classList.add("active");
        if ((mode === "exercise1" && exercise1Done.has(item.word)) || (mode === "exercise2" && exercise2Done.has(item.word))) {
          hotspot.classList.add("done");
        }
        hotspot.dataset.word = item.word;
        applyHotspotShape(hotspot, item);
        hotspot.setAttribute("aria-label", item.display_text || item.word);
        hotspot.innerHTML = mode === "study" ? `<span>${item.display_text || item.word}</span>` : "";
        hotspot.addEventListener("click", event => handleHotspot(item, event));
        hotspot.addEventListener("mouseleave", () => {
          if (mode !== "study" && !(mode === "exercise1" && exercise1Selected?.word === item.word)) hotspot.classList.remove("active");
        });
        hotspot.addEventListener("blur", () => {
          if (mode !== "study" && !(mode === "exercise1" && exercise1Selected?.word === item.word)) hotspot.classList.remove("active");
        });
        stage.appendChild(hotspot);

        if (mode === "study") {
          hotspot.addEventListener("mouseenter", () => {
            hotspot.classList.add("study-hover");
            showStudyTooltip(item);
            setStudyItemStatus(item);
          });
          hotspot.addEventListener("mouseleave", hideStudyTooltip);
          hotspot.addEventListener("focus", () => {
            hotspot.classList.add("study-hover");
            showStudyTooltip(item);
            setStudyItemStatus(item);
          });
          hotspot.addEventListener("blur", hideStudyTooltip);
        }
      });
    }

    audio.addEventListener("error", () => {
      const item = hotspots.find(row => row.word === activeKey);
      if (item) speakWithBrowser(item.pronunciation_text || item.word);
    });

    function handleExercisePanelSelection(event) {
      const choiceBtn = event.target.closest(".choice-btn");
      if (choiceBtn && exercisePanel.contains(choiceBtn)) {
        if (choiceBtn.disabled) return true;
        answerExercise1(choiceBtn.textContent.trim(), choiceBtn);
        return true;
      }

      const wordChip = event.target.closest(".word-chip");
      if (wordChip && exercisePanel.contains(wordChip)) {
        if (wordChip.disabled) return true;
        const item = hotspots.find(row => String(row.id) === wordChip.getAttribute("data-id"));
        selectExercise2Word(item);
        return true;
      }

      return false;
    }

    exercisePanel.addEventListener("pointerdown", event => {
      if (event.button && event.button !== 0) return;
      if (handleExercisePanelSelection(event)) {
        event.preventDefault();
      }
    });

    exercisePanel.addEventListener("click", event => {
      if (event.detail !== 0) return;
      handleExercisePanelSelection(event);
    });

    modeSelect.addEventListener("change", () => setMode(modeSelect.value));

    setMode("study");
    }

    initLesson().catch(error => {
      console.error(error);
      const root = document.querySelector(".app") || document.body;
      root.insertAdjacentHTML("afterbegin", `<div style="margin:12px;padding:12px;border:1px solid #e8d6e2;border-radius:8px;background:white;color:#b0006d;font-weight:700;">Không tải được dữ liệu bài học.</div>`);
    });
  </script>
</body>
</html>
