<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Từ vựng theo hình ảnh</title>
  <style>
    :root {
      --pink: #b0006d;
      --pink-soft: #fff0f8;
      --blue: #0b72d9;
      --text: #222;
      --muted: #6c5261;
      --border: #e8d6e2;
      --bg: #f7edf4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 4px;
      color: var(--pink);
      font-size: clamp(26px, 4vw, 42px);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }


    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .card {
      display: block;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(80, 0, 50, .08);
      transition: transform .16s, box-shadow .16s, border-color .16s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--pink);
      box-shadow: 0 12px 28px rgba(80, 0, 50, .13);
    }

    .thumb {
      aspect-ratio: 4 / 3;
      width: 100%;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .card-body {
      padding: 12px;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 7px;
    }

    .badge {
      border-radius: 999px;
      background: var(--pink-soft);
      color: var(--pink);
      font-weight: 700;
      padding: 3px 8px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      color: #18111a;
    }

    .vi {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      background: rgba(255, 255, 255, .7);
    }

    @media (max-width: 680px) {
      .app { padding: 12px; }
      .topbar { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div>
        <h1>Từ vựng theo hình ảnh</h1>
        <p class="subtitle">Chọn một chủ đề, bấm vào đồ vật trong ảnh để nghe phát âm.</p>
      </div>
    </div>

    <section class="grid" id="topicGrid"></section>
  </main>

  <script src="data.js"></script>
  <script>
    async function initHome() {
      await VOCAB_UTILS.loadData();

      const topicGrid = document.getElementById("topicGrid");
      const topics = VOCAB_UTILS.getActiveTopics();

      if (!topics.length) {
        topicGrid.innerHTML = `<div class="empty">Chưa có chủ đề nào. Hãy thêm dữ liệu vào sheet Topics.</div>`;
      } else {
        topicGrid.innerHTML = topics.map(topic => {
          const count = VOCAB_UTILS.getHotspots(topic.topic_id).length;
          return `
            <a class="card" href="lesson.html?topic=${encodeURIComponent(topic.topic_id)}">
              <img class="thumb" src="${topic.image}" alt="${topic.title}">
              <div class="card-body">
                <div class="meta">
                  <span class="badge">${topic.level || "A1"}</span>
                  <span>${count} từ</span>
                </div>
                <h2>${topic.title}</h2>
                <p class="vi">${topic.vi_title || ""}</p>
              </div>
            </a>
          `;
        }).join("");
      }
    }

    initHome().catch(error => {
      console.error(error);
      document.getElementById("topicGrid").innerHTML = `<div class="empty">Không tải được dữ liệu.</div>`;
    });
  </script>
</body>
</html>
